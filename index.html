<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cine-Search Pro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Cine-Search Pro</h1>
    <input id="searchBox" type="text" placeholder="Search for movies..." />
    <p class="hint">Type a title and press Enter to see the full grid of matches.</p>
    <ul id="suggestions" class="suggestions"></ul>
    <!-- TEMPLATE (required for DocumentFragment pattern) -->
    <template id="movieTemplate">
        <div class="movie-item">
            <img class="poster" />
            <div class="title"></div>
        </div>
    </template>
    <script type="module" src="js/app.js"></script>
</body>
</html>
